name: Build & Push to Alibaba Cloud ACR

on:
  push:
    branches: [main]

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}       # e.g. registry.cn-hangzhou.aliyuncs.com
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}      # e.g. my-project
  IMAGE_NAME: anchor-app
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Generate metadata tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-,format=short
            type=raw,value={{date 'YYYYMMDD-HHmmss' tz='Asia/Shanghai'}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Optional: notify team ─────────────────────────────
  notify:
    needs: [build-and-push]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch result
        run: |
          echo "Build status: ${{ needs.build-and-push.result }}"
          echo "Image: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}@${{ github.sha }}"
